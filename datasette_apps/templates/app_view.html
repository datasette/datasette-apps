{% extends "base.html" %}

{% block title %}{{ app.name }}{% endblock %}

{% block content %}
<div class="datasette-app-view-header">
  <h1>{{ app.name }}</h1>
  <div class="datasette-app-actions">
    <a class="datasette-app-button" href="/-/apps">All apps</a>
    <a class="datasette-app-button" href="/-/apps/{{ app.id }}/edit">Edit app</a>
    <form class="datasette-app-pin-form" method="post" action="/-/apps/{{ app.id }}/{% if pinned %}unpin{% else %}pin{% endif %}">
      <input type="hidden" name="next" value="{{ current_path }}">
      <button
        class="datasette-app-button datasette-app-pin-button"
        type="submit"
        aria-pressed="{% if pinned %}true{% else %}false{% endif %}"
        aria-label="{% if pinned %}Unpin{% else %}Pin{% endif %} {{ app.name }}"
      >{% if pinned %}Unpin{% else %}Pin{% endif %}</button>
    </form>
  </div>
</div>

<iframe
  id="datasette-app-frame"
  sandbox="allow-scripts"
  csp="{{ csp }}"
  srcdoc="{{ srcdoc }}"
  style="width: 100%; min-height: 70vh; border: 1px solid #ccc;"
></iframe>
{{ parent_bridge|safe }}
{% endblock %}
