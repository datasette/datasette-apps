{% extends "base.html" %}

{% block title %}Create app{% endblock %}

{% block extra_head %}
{{ codemirror_assets|safe }}
{% endblock %}

{% block content %}
<h1>Create app</h1>

<form class="datasette-app-form" method="post">
  <div class="datasette-app-form-row">
    <label for="app-name">Name</label>
    <input id="app-name" type="text" name="name">
  </div>
  <div class="datasette-app-form-row">
    <label for="app-description">Description</label>
    <textarea id="app-description" name="description" rows="3"></textarea>
  </div>
  <div class="datasette-app-form-row">
    <label for="html-editor">HTML</label>
    <textarea id="html-editor" name="html"></textarea>
  </div>
  <div class="datasette-app-form-actions">
    <button type="submit">Create app</button>
  </div>
</form>

<section class="datasette-app-llm-prompt">
  <h2>LLM prompt</h2>
  <div class="datasette-app-form-actions">
    <button type="button" id="copy-llm-prompt">Copy prompt</button>
  </div>
  <textarea id="llm-prompt" rows="24" cols="100" readonly>{{ llm_prompt }}</textarea>
</section>

<script>
document.getElementById("copy-llm-prompt").addEventListener("click", async function() {
  await navigator.clipboard.writeText(document.getElementById("llm-prompt").value);
});
</script>
{% endblock %}
