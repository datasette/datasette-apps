[project]
name = "datasette-apps"
version = "0.1a1"
description = "Create apps that live inside Datasette"
readme = "README.md"
authors = [{name = "Simon Willison"}]
license = "Apache-2.0"
classifiers=[
    "Framework :: Datasette"
]
requires-python = ">=3.10"
dependencies = [
    "datasette>=1.0a31",
    "datasette-agent-edit>=0.1a0",
]

[dependency-groups]
dev = [
    "playwright>=1.60.0",
    "pytest",
    "pytest-asyncio",
    "datasette-acl>=0.5a1",
    "datasette-acl-share @ https://github.com/datasette/datasette-acl-share/releases/download/0.0.1a2/datasette_acl_share-0.0.1a2-py3-none-any.whl",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"


[project.urls]
Homepage = "https://github.com/datasette/datasette-apps"
Changelog = "https://github.com/datasette/datasette-apps/releases"
Issues = "https://github.com/datasette/datasette-apps/issues"
CI = "https://github.com/datasette/datasette-apps/actions"

[project.entry-points.datasette]
apps = "datasette_apps"

[tool.pytest.ini_options]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.setuptools.package-data]
datasette_apps = ["static/*", "templates/*"]

[tool.setuptools.packages.find]
include = ["datasette_apps"]
