[project]
name = "datasette-apps"
version = "0.1a0.dev0"
description = "Apps that live inside Datasette"
readme = "README.md"
authors = [{name = "Simon Willison"}]
license = "Apache-2.0"
classifiers=[
    "Framework :: Datasette"
]
requires-python = ">=3.10"
dependencies = [
    "datasette"
]

[tool.uv.sources]
datasette = { path = "../datasette", editable = true }

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"


[project.urls]
Homepage = "https://github.com/datasette/datasette-apps"
Changelog = "https://github.com/datasette/datasette-apps/releases"
Issues = "https://github.com/datasette/datasette-apps/issues"
CI = "https://github.com/datasette/datasette-apps/actions"

[project.entry-points.datasette]
apps = "datasette_apps"

[tool.pytest.ini_options]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.setuptools.package-data]
datasette_apps = ["static/*", "templates/*"]

[tool.setuptools.packages.find]
include = ["datasette_apps"]
